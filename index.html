        const KNOCKOUT_ROUNDS = [

            { title: "Finales", matches: FINALS, color: "text-amber-600", bg: "bg-amber-50", focus: "focus:border-amber-400", btn: "bg-amber-600" }
        ];

        // --- NUEVAS LÓGICAS PARA QUINIELA ---
        const ALL_MATCHES = [...MATCHES_DATA, ...ROUND_OF_32, ...ROUND_OF_16, ...QUARTERFINALS, ...SEMIFINALS, ...FINALS];

        const BarChart = ({className}) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><line x1="12" y1="20" x2="12" y2="10"></line><line x1="18" y1="20" x2="18" y2="4"></line><line x1="6" y1="20" x2="6" y2="16"></line></svg>;
        const Lock = ({className}) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
        const Edit = ({className}) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;

        // Función para calcular las 23:59 hrs del día anterior
        const parseLockDate = (dateStr) => {
            if (!dateStr) return new Date(2026, 5, 27, 23, 59, 59); // Asumimos que si no tiene fecha exacta (16vos) se cierra antes de eliminatorias
            const parts = dateStr.split(" ");
            const day = parseInt(parts[0], 10);
            const month = parts[2].toLowerCase() === "junio" ? 5 : 6;
            return new Date(2026, month, day - 1, 23, 59, 59);
        };

        const formatLockDate = (dateStr) => {
            const d = parseLockDate(dateStr);
            const day = d.getDate();
            const month = d.getMonth() === 5 ? 'junio' : 'julio';
            return `Cierra: ${day} de ${month}, 23:59 hrs`;
        };

        const isMatchLocked = (dateStr) => {
            return new Date() > parseLockDate(dateStr);
        };

        function App() {
            const [user, setUser] = useState(null);
            
            // Nuevos estados para DB separada (Usuarios, Apuestas y Realidad)
            const [usersDb, setUsersDb] = useState(null);
            const [predictions, setPredictions] = useState({});
            const [realScores, setRealScores] = useState({});
            
            const [savingId, setSavingId] = useState(null);
            const [savedId, setSavedId] = useState(null);
            const [db, setDb] = useState(null);
            const [isFirebaseConfigured, setIsFirebaseConfigured] = useState(false);
            const [nameInput, setNameInput] = useState("");
            
            // Tabs: 'pronosticos', 'reales', 'torneo', 'ranking'
            const [activeTab, setActiveTab] = useState('pronosticos');
            const [filterDate, setFilterDate] = useState("");
            const [filterGroup, setFilterGroup] = useState("");
            const [filterTeam, setFilterTeam] = useState("");
            const [showFilters, setShowFilters] = useState(false);

            // --- INICIALIZAR FIREBASE ---
            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        if (!firebaseConfig.apiKey || firebaseConfig.apiKey === "TU_API_KEY_AQUI") return;

                        const { initializeApp, getFirestore, getAuth, signInAnonymously, onAuthStateChanged } = window.firebaseModules;
                        const app = initializeApp(firebaseConfig);
                        const firestore = getFirestore(app);
                        const auth = getAuth(app);
                        
                        setDb(firestore);
                        await signInAnonymously(auth);
                        setIsFirebaseConfigured(true);

                        onAuthStateChanged(auth, (currentUser) => {
                            setUser(currentUser);
                        });
                    } catch (error) {
                        setIsFirebaseConfigured(false);
                    }
                };
                
                const checkFirebase = setInterval(() => {
                    if (window.firebaseModules) {
                        clearInterval(checkFirebase);
                        initFirebase();
                    }
                }, 100);
                return () => clearInterval(checkFirebase);
            }, []);

            // --- TRAER DATOS (3 Colecciones a la vez) ---
            useEffect(() => {
                if (!db || !user || !isFirebaseConfigured) return;

                const { collection, onSnapshot } = window.firebaseModules;
                
                const unsubs = [
                    onSnapshot(collection(db, 'quiniela_2026_users'), (snapshot) => {
                        let u = {}; snapshot.forEach(doc => u[doc.id] = doc.data()); setUsersDb(u);
                    }),
                    onSnapshot(collection(db, 'quiniela_2026_predictions'), (snapshot) => {
                        let p = {}; snapshot.forEach(doc => p[doc.id] = doc.data()); setPredictions(p);
                    }),
                    onSnapshot(collection(db, 'quiniela_2026_reales'), (snapshot) => {
                        let r = {}; snapshot.forEach(doc => r[doc.id] = doc.data()); setRealScores(r);
                    })
                ];

                return () => unsubs.forEach(unsub => unsub());
            }, [db, user, isFirebaseConfigured]);

            // --- CÁLCULO DEL RANKING (Puntos) ---
            const rankingList = useMemo(() => {
                const ranks = Object.values(usersDb || {}).map(u => ({ ...u, pts: 0, exactos: 0, aciertos: 0 }));
                ranks.forEach(userRank => {
                    ALL_MATCHES.forEach(m => {
                        const p = predictions[`${userRank.uid}_${m.id}`];
                        const r = realScores[m.id];
                        if (p && r && p.score1 !== '' && p.score2 !== '' && r.score1 !== undefined && r.score2 !== undefined && r.score1 !== '' && r.score2 !== '') {
                            const ps1 = Number(p.score1), ps2 = Number(p.score2);
                            const rs1 = Number(r.score1), rs2 = Number(r.score2);
                            // Criterio 1: Resultado exacto (3 pts)
                            if (ps1 === rs1 && ps2 === rs2) {
                                userRank.pts += 3;
                                userRank.exactos += 1;
                            } 
                            // Criterio 2: Atinarle al ganador o empate (1 pt)
                            else if (Math.sign(ps1 - ps2) === Math.sign(rs1 - rs2)) {
                                userRank.pts += 1;
                                userRank.aciertos += 1;
                            }
                        }
                    });
                });
                return ranks.sort((a, b) => b.pts - a.pts || b.exactos - a.exactos || b.aciertos - a.aciertos);
            }, [usersDb, predictions, realScores]);

            // --- TABLAS Y CRUCES (Basados SOLAMENTE en Resultados Reales) ---
            const standings = useMemo(() => {
                const groups = {};
                const uniqueGroups = [...new Set(MATCHES_DATA.map(m => m.group))].sort();
                
                uniqueGroups.forEach(g => {
                    groups[g] = {};
                    MATCHES_DATA.filter(m => m.group === g).forEach(m => {
                        if(!groups[g][m.team1]) groups[g][m.team1] = { pj:0, pg:0, pe:0, pp:0, gf:0, gc:0, pts:0 };
                        if(!groups[g][m.team2]) groups[g][m.team2] = { pj:0, pg:0, pe:0, pp:0, gf:0, gc:0, pts:0 };
                    });
                });

                MATCHES_DATA.forEach(match => {
                    const result = realScores[match.id]; // <--- AHORA LEE LA REALIDAD
                    if (result && result.score1 !== undefined && result.score2 !== undefined && result.score1 !== '' && result.score2 !== '') {
                        const s1 = Number(result.score1);
                        const s2 = Number(result.score2);
                        const g = match.group;
                        const t1 = match.team1;
                        const t2 = match.team2;

                        groups[g][t1].pj += 1; groups[g][t2].pj += 1;
                        groups[g][t1].gf += s1; groups[g][t2].gf += s2;
                        groups[g][t1].gc += s2; groups[g][t2].gc += s1;

                        if (s1 > s2) {
                            groups[g][t1].pg += 1; groups[g][t1].pts += 3; groups[g][t2].pp += 1;
                        } else if (s1 < s2) {
                            groups[g][t2].pg += 1; groups[g][t2].pts += 3; groups[g][t1].pp += 1;
                        } else {
                            groups[g][t1].pe += 1; groups[g][t1].pts += 1; groups[g][t2].pe += 1; groups[g][t2].pts += 1;
                        }
                    }
                });

                const sortedGroups = {};
                Object.keys(groups).forEach(g => {
                    sortedGroups[g] = Object.entries(groups[g]).map(([team, stats]) => ({
                        team, ...stats, dif: stats.gf - stats.gc
                    })).sort((a, b) => {
                        if (b.pts !== a.pts) return b.pts - a.pts;
                        if (b.dif !== a.dif) return b.dif - a.dif;
                        return b.gf - a.gf;
                    });
                });

                return sortedGroups;
            }, [realScores]);

            const bestThirds = useMemo(() => {
                if (Object.keys(standings).length === 0) return [];
                const thirds = Object.keys(standings).map(g => ({ ...standings[g][2], group: g }));
                return thirds.sort((a, b) => {
                    if (b.pts !== a.pts) return b.pts - a.pts;
                    if (b.dif !== a.dif) return b.dif - a.dif;
                    return b.gf - a.gf;
                });
            }, [standings]);

            const getTeamFromStandings = (group, pos) => group && standings[group] && standings[group][pos] ? standings[group][pos] : null;

            const resolvedTeams = useMemo(() => {
                const teams = {};
                ROUND_OF_32.forEach(m => {
                    const t1 = getTeamFromStandings(m.group1, m.pos1);
                    const t2 = getTeamFromStandings(m.group2, m.pos2);
                    teams[m.id] = { team1: t1 ? t1.team : m.label1, team2: t2 ? t2.team : m.label2, t1Resolved: !!t1, t2Resolved: !!t2 };
                });

                const getAdvanceTeam = (matchId, isLosers = false) => {
                    const matchScore = realScores[matchId]; // <--- AVANCE BASADO EN REALIDAD
                    let titleRef = matchId.startsWith('k') ? "16vos " + matchId.replace('k','') : matchId.startsWith('o') ? "Octavos " + matchId.replace('o','') : matchId.startsWith('q') ? "Cuartos " + matchId.replace('q','') : "Semis " + matchId.replace('s','');
                    let defaultName = isLosers ? `Perd. ${titleRef}` : `Gan. ${titleRef}`;
                    
                    if (!matchScore || matchScore.score1 === '' || matchScore.score2 === '') return { team: defaultName, resolved: false };
                    const s1 = Number(matchScore.score1), s2 = Number(matchScore.score2);
                    if (s1 === s2) return { team: `Penales ${titleRef}`, resolved: false }; // En caso de empate en vida real
                    
                    const tInfo = teams[matchId];
                    if (!tInfo || !tInfo.t1Resolved || !tInfo.t2Resolved) return { team: defaultName, resolved: false };
                    
                    if (isLosers) return s1 < s2 ? { team: tInfo.team1, resolved: true } : { team: tInfo.team2, resolved: true };
                    return s1 > s2 ? { team: tInfo.team1, resolved: true } : { team: tInfo.team2, resolved: true };
                };

                ROUND_OF_16.forEach(m => { const t1 = getAdvanceTeam(m.source1); const t2 = getAdvanceTeam(m.source2); teams[m.id] = { team1: t1.team, team2: t2.team, t1Resolved: t1.resolved, t2Resolved: t2.resolved }; });
                QUARTERFINALS.forEach(m => { const t1 = getAdvanceTeam(m.source1); const t2 = getAdvanceTeam(m.source2); teams[m.id] = { team1: t1.team, team2: t2.team, t1Resolved: t1.resolved, t2Resolved: t2.resolved }; });
                SEMIFINALS.forEach(m => { const t1 = getAdvanceTeam(m.source1); const t2 = getAdvanceTeam(m.source2); teams[m.id] = { team1: t1.team, team2: t2.team, t1Resolved: t1.resolved, t2Resolved: t2.resolved }; });
                FINALS.forEach(m => { const t1 = getAdvanceTeam(m.source1, m.isLosers); const t2 = getAdvanceTeam(m.source2, m.isLosers); teams[m.id] = { team1: t1.team, team2: t2.team, t1Resolved: t1.resolved, t2Resolved: t2.resolved }; });

                return teams;
            }, [realScores, standings]);

            // --- ACCIONES ---
            const saveName = async () => {
                if (!nameInput.trim() || !db || !user) return;
                await window.firebaseModules.setDoc(window.firebaseModules.doc(db, 'quiniela_2026_users', user.uid), {
                    uid: user.uid, name: nameInput.trim(), joinedAt: new Date().toISOString()
                });
            };

            const handleScoreChange = (matchId, team, value) => {
                if (!isFirebaseConfigured || activeTab === 'torneo' || activeTab === 'ranking') return; 
                if (value !== '' && !/^\d+$/.test(value)) return;
                
                if (activeTab === 'pronosticos') {
                    const key = `${user.uid}_${matchId}`;
                    setPredictions(prev => ({ ...prev, [key]: { ...prev[key], [team]: value } }));
                } else if (activeTab === 'reales') {
                    setRealScores(prev => ({ ...prev, [matchId]: { ...prev[matchId], [team]: value } }));
                }
            };

            const saveScore = async (matchId) => {
                if (!db || !user || !isFirebaseConfigured) return alert("Sin conexión a Firebase.");
                setSavingId(matchId);
                
                try {
                    const { doc, setDoc } = window.firebaseModules;
                    if (activeTab === 'pronosticos') {
                        const p = predictions[`${user.uid}_${matchId}`];
                        if (p && p.score1 !== undefined && p.score2 !== undefined && p.score1 !== '' && p.score2 !== '') {
                            await setDoc(doc(db, 'quiniela_2026_predictions', `${user.uid}_${matchId}`), {
                                uid: user.uid, matchId, score1: Number(p.score1), score2: Number(p.score2), updatedAt: new Date().toISOString()
                            });
                        }
                    } else if (activeTab === 'reales') {
                        const r = realScores[matchId];
                        if (r && r.score1 !== undefined && r.score2 !== undefined && r.score1 !== '' && r.score2 !== '') {
                            await setDoc(doc(db, 'quiniela_2026_reales', matchId), {
                                score1: Number(r.score1), score2: Number(r.score2), updatedBy: user.uid, updatedAt: new Date().toISOString()
                            });
                        }
                    }
                    setSavingId(null); setSavedId(matchId); setTimeout(() => setSavedId(null), 2000);
                } catch (error) {
                    setSavingId(null); alert("Hubo un error al guardar.");
                }
            };

            // --- UI HELPERS ---
            const renderMatchCard = (match, stageTitle, bg, color, focus, btn) => {
                const isGroupMatch = match.id.startsWith('m');
                let t1Name, t2Name, isT1Resolved, isT2Resolved;

                if (isGroupMatch) {
                    t1Name = match.team1;
                    t2Name = match.team2;
                    isT1Resolved = true;
                    isT2Resolved = true;
                } else {
                    const tInfo = resolvedTeams[match.id] || {};
                    t1Name = tInfo.team1 || match.label1 || "TBD";
                    t2Name = tInfo.team2 || match.label2 || "TBD";
                    isT1Resolved = tInfo.t1Resolved;
                    isT2Resolved = tInfo.t2Resolved;
                }

                const t1Flag = isT1Resolved ? (TEAM_FLAGS[t1Name] || "🏴") : "❔";
                const t2Flag = isT2Resolved ? (TEAM_FLAGS[t2Name] || "🏴") : "❔";

                const pKey = `${user?.uid}_${match.id}`;
                const val1 = activeTab === 'pronosticos' ? predictions[pKey]?.score1 : realScores[match.id]?.score1;
                const val2 = activeTab === 'pronosticos' ? predictions[pKey]?.score2 : realScores[match.id]?.score2;
                
                const lockedUI = activeTab === 'pronosticos' && isMatchLocked(match.date);
                const disabledInput = !isFirebaseConfigured || lockedUI || activeTab === 'torneo' || activeTab === 'ranking';

                return (
                    <div key={match.id} className="bg-white rounded-2xl p-4 md:p-5 shadow-sm border border-slate-200 flex flex-col relative overflow-hidden">
                        <div className="flex justify-between items-start mb-4 border-b border-slate-100 pb-3">
                            <div className="flex flex-col gap-1">
                                <div className={`flex items-center gap-1.5 text-xs md:text-sm font-black ${color}`}>
                                    {stageTitle.includes('Grupo') ? <Calendar className="w-4 h-4" /> : <Swords className="w-4 h-4" />}
                                    {stageTitle}
                                </div>
                                <div className="flex items-center gap-1.5 text-[11px] md:text-xs text-slate-500 font-medium ml-0.5">
                                    {match.date ? `${match.date} • ${match.time}` : 'Eliminatorias'} • <MapPin className="w-3 h-3 text-rose-500" /> {match.venue}
                                </div>
                                {activeTab === 'pronosticos' && !lockedUI && (
                                    <div className="flex items-center gap-1 text-[10px] text-amber-600 font-bold ml-0.5 mt-0.5">
                                        ⏳ {formatLockDate(match.date)}
                                    </div>
                                )}
                            </div>
                            <div className={`${bg} ${color} px-2 py-1 rounded-md text-[10px] md:text-xs font-bold uppercase mt-1`}>
                                {match.matchTitle || `Grupo ${match.group}`}
                            </div>
                        </div>

                        <div className="flex items-center justify-between bg-slate-50 p-3 md:p-4 rounded-xl border border-slate-100">
                            <div className="flex flex-col md:flex-row items-center gap-2 w-[35%] text-center md:text-right md:justify-end">
                                <div className="hidden md:flex flex-col items-end">
                                    <span className={`font-bold text-xs md:text-sm leading-tight ${isT1Resolved ? 'text-slate-800' : 'text-slate-400'}`}>{t1Name}</span>
                                    {isT1Resolved && match.label1 && <span className="text-[9px] text-slate-400 uppercase tracking-widest">{match.label1}</span>}
                                </div>
                                <span className="text-3xl md:text-4xl drop-shadow-sm opacity-90">{t1Flag}</span>
                                <div className="flex md:hidden flex-col items-center">
                                    <span className={`font-bold text-[10px] leading-tight ${isT1Resolved ? 'text-slate-800' : 'text-slate-400'}`}>{t1Name}</span>
                                </div>
                            </div>
                            
                            <div className="w-[30%] flex justify-center items-center gap-2 md:gap-3">
                                <input type="text" inputMode="numeric" maxLength="2" disabled={disabledInput} value={val1 !== undefined ? val1 : ''} onChange={(e) => handleScoreChange(match.id, 'score1', e.target.value)} className={`w-10 h-10 md:w-12 md:h-12 text-center text-xl md:text-2xl font-black bg-white border-2 border-slate-300 rounded-lg ${focus} focus:ring-0 outline-none transition-colors disabled:bg-slate-100 disabled:text-slate-500`} />
                                <span className="text-slate-400 font-black">-</span>
                                <input type="text" inputMode="numeric" maxLength="2" disabled={disabledInput} value={val2 !== undefined ? val2 : ''} onChange={(e) => handleScoreChange(match.id, 'score2', e.target.value)} className={`w-10 h-10 md:w-12 md:h-12 text-center text-xl md:text-2xl font-black bg-white border-2 border-slate-300 rounded-lg ${focus} focus:ring-0 outline-none transition-colors disabled:bg-slate-100 disabled:text-slate-500`} />
                            </div>

                            <div className="flex flex-col md:flex-row items-center gap-2 w-[35%] text-center md:text-left md:justify-start">
                                <span className="text-3xl md:text-4xl drop-shadow-sm opacity-90">{t2Flag}</span>
                                <div className="hidden md:flex flex-col items-start">
                                    <span className={`font-bold text-xs md:text-sm leading-tight ${isT2Resolved ? 'text-slate-800' : 'text-slate-400'}`}>{t2Name}</span>
                                    {isT2Resolved && match.label2 && <span className="text-[9px] text-slate-400 uppercase tracking-widest">{match.label2}</span>}
                                </div>
                                <div className="flex md:hidden flex-col items-center">
                                    <span className={`font-bold text-[10px] leading-tight ${isT2Resolved ? 'text-slate-800' : 'text-slate-400'}`}>{t2Name}</span>
                                </div>
                            </div>
                        </div>

                        {activeTab !== 'torneo' && activeTab !== 'ranking' && (
                            <div className="mt-4 flex items-center justify-between">
                                <div className="flex flex-wrap items-center gap-1.5">
                                    {match.tv && match.tv.map((channel, i) => (
                                        <span key={i} className={`text-[9px] md:text-[10px] font-bold px-1.5 py-0.5 rounded-md border ${getTvBadgeColor(channel)}`}>
                                            {channel}
                                        </span>
                                    ))}
                                </div>
                                {lockedUI ? (
                                    <div className="flex items-center gap-1 text-slate-500 text-xs font-bold bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200">
                                        <Lock className="w-4 h-4" /> Cerrado
                                    </div>
                                ) : (
                                    <button onClick={() => saveScore(match.id)} disabled={val1 === undefined || val1 === '' || val2 === undefined || val2 === '' || savingId === match.id} className={`flex items-center gap-1.5 px-3 py-1.5 md:px-4 md:py-2 rounded-lg text-sm font-bold transition-all ${savedId === match.id ? 'bg-green-100 text-green-700' : `${btn} text-white hover:opacity-90 disabled:bg-slate-200 disabled:text-slate-400`}`}>
                                        {savingId === match.id ? <div className="animate-spin w-4 h-4 border-2 border-white border-t-transparent rounded-full"></div> : savedId === match.id ? <><CheckCircle2 className="w-4 h-4" /> Listo</> : <><Save className="w-4 h-4" /> Guardar</>}
                                    </button>
                                )}
                            </div>
                        )}
                    </div>
                );
            };

            const filteredMatches = useMemo(() => MATCHES_DATA.filter(match => (filterDate ? match.date === filterDate : true) && (filterGroup ? match.group === filterGroup : true)), [filterDate, filterGroup]);
            const uniqueDates = useMemo(() => [...new Set(MATCHES_DATA.map(m => m.date))], []);
            const uniqueGroups = useMemo(() => [...new Set(MATCHES_DATA.map(m => m.group))].sort(), []);
            const clearFilters = () => { setFilterDate(""); setFilterGroup(""); };
            const getTvBadgeColor = (channel) => {
                switch(channel) {
                    case 'ViX': return 'bg-orange-100 text-orange-700 border-orange-200';
                    case 'TUDN': return 'bg-rose-100 text-rose-800 border-rose-200';
                    case 'TV Azteca': return 'bg-emerald-100 text-emerald-800 border-emerald-200';
                    default: return 'bg-slate-100 text-slate-800 border-slate-200';
                }
            };

            // MODAL DE REGISTRO INICIAL
            if (isFirebaseConfigured && user && usersDb !== null && !usersDb[user.uid]) {
                return (
                    <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                        <div className="bg-white p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl">
                            <Trophy className="w-16 h-16 text-amber-500 mx-auto mb-4" />
                            <h2 className="text-2xl font-black text-slate-800 mb-2">¡Bienvenido!</h2>
                            <p className="text-sm text-slate-500 mb-6">Ingresa tu nombre o apodo para unirte a la Quiniela 2026.</p>
                            <input type="text" value={nameInput} onChange={e=>setNameInput(e.target.value)} placeholder="Ej: Marco..." className="w-full text-center text-xl font-bold p-4 border-2 border-slate-200 rounded-xl focus:border-teal-500 outline-none mb-6"/>
                            <button onClick={saveName} disabled={!nameInput.trim()} className="w-full bg-teal-600 text-white font-black py-4 rounded-xl hover:bg-teal-700 disabled:opacity-50 transition-colors">Entrar a Jugar</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-800 pb-24">
                    <header className="bg-gradient-to-r from-emerald-800 to-teal-900 text-white py-6 px-4 shadow-md sticky top-0 z-20">
                        <div className="max-w-6xl mx-auto flex flex-col gap-3">
                            <div className="flex items-center justify-between">
                                <h1 className="text-2xl md:text-3xl font-extrabold tracking-tight flex items-center gap-2">
                                    <Users className="w-6 h-6 md:w-8 md:h-8" />
                                    Quiniela en Vivo
                                </h1>
                            </div>
                            <p className="text-emerald-100 text-xs md:text-sm">
                                {isFirebaseConfigured ? `Hola, ${usersDb?.[user?.uid]?.name || 'Jugador'} 🟢` : "🟡 Conectando con Firebase..."}
                            </p>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4 py-6">
                        
                        {/* ALERTAS SUPERIORES */}
                        {activeTab === 'pronosticos' && (
                            <div className="mb-6 bg-teal-50 border border-teal-200 text-teal-800 p-4 rounded-2xl flex items-start gap-3">
                                <Edit className="w-5 h-5 flex-shrink-0 mt-0.5" />
                                <div className="text-sm font-medium">Aquí guardas tus predicciones personales. Recuerda que los partidos se bloquearán y no podrás editarlos a partir de las 23:59 hrs del día anterior a cada encuentro.</div>
                            </div>
                        )}
                        {activeTab === 'reales' && (
                            <div className="mb-6 bg-rose-50 border border-rose-200 text-rose-800 p-4 rounded-2xl flex items-start gap-3">
                                <Info className="w-5 h-5 flex-shrink-0 mt-0.5" />
                                <div className="text-sm font-medium">¡ATENCIÓN! Estás en la pestaña de <b>Resultados Oficiales</b>. Los datos que ingreses aquí afectarán el Ranking y el Torneo para TODOS los jugadores. Solo anota resultados cuando los partidos hayan terminado en la vida real.</div>
                            </div>
                        )}

                        {/* === VISTA PARTIDOS (Pronósticos y Reales) === */}
                        {(activeTab === 'pronosticos' || activeTab === 'reales') && (
                            <div className="flex flex-col gap-8">
                                <div>
                                    <div className="flex items-center gap-2 font-black text-xl md:text-2xl mb-4 text-slate-800">
                                        <Calendar className="w-6 h-6" /> Fase de Grupos
                                    </div>
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6">
                                        {filteredMatches.map(match => renderMatchCard(match, `Fase de Grupos`, 'bg-slate-100', 'text-slate-600', 'focus:border-teal-500', 'bg-teal-600'))}
                                    </div>
                                </div>
                                {KNOCKOUT_ROUNDS.map((round, idx) => (
                                    <div key={idx}>
                                        <div className={`flex items-center gap-2 font-black text-xl md:text-2xl mb-4 ${round.color}`}>
                                            <Swords className="w-6 h-6" /> {round.title}
                                        </div>
                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6">
                                            {round.matches.map(match => renderMatchCard(match, round.title, round.bg, round.color, round.focus, round.btn))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* === VISTA DE TORNEO (Solo Tablas y Llaves basadas en Resultados Reales) === */}
                        {activeTab === 'torneo' && (
                            <div className="flex flex-col gap-8">
                                <div className="mb-2 bg-indigo-50 border border-indigo-200 text-indigo-800 p-4 rounded-2xl flex items-start gap-3">
                                    <Trophy className="w-5 h-5 flex-shrink-0 mt-0.5" />
                                    <div className="text-sm font-medium">Esta sección muestra cómo va el Mundial <b>Oficialmente</b> (basado en la pestaña "Oficiales"). Tus pronósticos personales no alteran estas tablas.</div>
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    {Object.keys(standings).map(groupName => (
                                        <div key={groupName} className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                            <div className="bg-slate-50 px-4 py-3 border-b border-slate-200 font-black text-slate-700">Grupo {groupName}</div>
                                            <div className="overflow-x-auto">
                                                <table className="w-full text-sm text-left">
                                                    <thead className="text-xs text-slate-500 uppercase bg-white border-b border-slate-100">
                                                        <tr>
                                                            <th className="px-4 py-3 font-bold">Equipo</th>
                                                            <th className="px-2 py-3 text-center">PJ</th>
                                                            <th className="px-2 py-3 text-center hidden sm:table-cell">G</th>
                                                            <th className="px-2 py-3 text-center hidden sm:table-cell">E</th>
                                                            <th className="px-2 py-3 text-center hidden sm:table-cell">P</th>
                                                            <th className="px-2 py-3 text-center text-slate-400">DG</th>
                                                            <th className="px-4 py-3 text-center text-indigo-700 font-black">PTS</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {standings[groupName].map((teamData, index) => (
                                                            <tr key={teamData.team} className={`border-b border-slate-50 hover:bg-slate-50 ${index < 2 ? 'bg-indigo-50/30' : index === 2 ? 'bg-amber-50/20' : ''}`}>
                                                                <td className="px-4 py-3 font-bold text-slate-800 flex items-center gap-2">
                                                                    <span className="text-slate-400 font-normal w-3">{index + 1}</span>
                                                                    <span className="text-xl" title={teamData.team}>{TEAM_FLAGS[teamData.team] || "🏴"}</span>
                                                                    <span className="truncate max-w-[100px] sm:max-w-full">{teamData.team}</span>
                                                                </td>
                                                                <td className="px-2 py-3 text-center text-slate-600">{teamData.pj}</td>
                                                                <td className="px-2 py-3 text-center text-slate-600 hidden sm:table-cell">{teamData.pg}</td>
                                                                <td className="px-2 py-3 text-center text-slate-600 hidden sm:table-cell">{teamData.pe}</td>
                                                                <td className="px-2 py-3 text-center text-slate-600 hidden sm:table-cell">{teamData.pp}</td>
                                                                <td className="px-2 py-3 text-center text-slate-500 font-medium">{teamData.dif > 0 ? `+${teamData.dif}` : teamData.dif}</td>
                                                                <td className="px-4 py-3 text-center font-black text-indigo-700 text-base">{teamData.pts}</td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                {KNOCKOUT_ROUNDS.map((round, idx) => (
                                    <div key={idx}>
                                        <div className={`flex items-center gap-2 font-black text-xl md:text-2xl mb-4 ${round.color}`}>
                                            <Swords className="w-6 h-6" /> {round.title}
                                        </div>
                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6">
                                            {round.matches.map(match => renderMatchCard(match, round.title, round.bg, round.color, round.focus, round.btn))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* === VISTA RANKING === */}
                        {activeTab === 'ranking' && (
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="bg-gradient-to-r from-slate-800 to-slate-900 px-6 py-4 text-white flex items-center justify-between">
                                    <h2 className="text-xl md:text-2xl font-black flex items-center gap-2"><BarChart className="w-6 h-6 text-amber-400" /> Posiciones</h2>
                                    <div className="text-[10px] md:text-xs text-slate-300 text-right">
                                        Pleno: <b className="text-amber-400">3 pts</b><br/>Resultado: <b className="text-amber-400">1 pt</b>
                                    </div>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-xs uppercase text-slate-500 border-b border-slate-200">
                                            <tr>
                                                <th className="px-4 py-4 font-bold text-center w-12">Pos</th>
                                                <th className="px-4 py-4 font-bold">Jugador</th>
                                                <th className="px-2 py-4 text-center font-bold" title="Resultados Exactos (3 pts)">Plenos</th>
                                                <th className="px-2 py-4 text-center font-bold" title="Aciertos Parciales (1 pt)">Aciertos</th>
                                                <th className="px-4 py-4 text-center font-black text-slate-800">Puntos</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {rankingList.map((rank, i) => (
                                                <tr key={rank.uid} className={rank.uid === user?.uid ? 'bg-amber-50/40' : 'hover:bg-slate-50'}>
                                                    <td className="px-4 py-4 text-center text-slate-400 font-bold">{i + 1}</td>
                                                    <td className="px-4 py-4 font-bold text-slate-800 flex items-center gap-2">
                                                        {i === 0 && <Trophy className="w-4 h-4 text-amber-500" />}
                                                        <span className="truncate max-w-[120px] md:max-w-full">{rank.name}</span>
                                                        {rank.uid === user?.uid && <span className="text-[9px] bg-amber-200 text-amber-800 px-1.5 py-0.5 rounded font-black">TÚ</span>}
                                                    </td>
                                                    <td className="px-2 py-4 text-center text-slate-500">{rank.exactos}</td>
                                                    <td className="px-2 py-4 text-center text-slate-500">{rank.aciertos}</td>
                                                    <td className="px-4 py-4 text-center text-xl font-black text-amber-500">{rank.pts}</td>
                                                </tr>
                                            ))}
                                            {rankingList.length === 0 && <tr><td colSpan="5" className="text-center py-12 text-slate-400">Aún no hay jugadores con puntos.</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around pb-safe pt-2 px-1 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-30">
                        <button onClick={() => setActiveTab('pronosticos')} className={`flex flex-col items-center p-2 min-w-[70px] rounded-xl transition-colors ${activeTab === 'pronosticos' ? 'text-teal-600' : 'text-slate-400 hover:bg-slate-50'}`}>
                            <Edit className="w-6 h-6 mb-1" />
                            <span className="text-[10px] font-bold">Mis Picks</span>
                        </button>
                        <button onClick={() => setActiveTab('reales')} className={`flex flex-col items-center p-2 min-w-[70px] rounded-xl transition-colors ${activeTab === 'reales' ? 'text-rose-600' : 'text-slate-400 hover:bg-slate-50'}`}>
                            <CheckCircle2 className="w-6 h-6 mb-1" />
                            <span className="text-[10px] font-bold">Oficiales</span>
                        </button>
                        <button onClick={() => setActiveTab('torneo')} className={`flex flex-col items-center p-2 min-w-[70px] rounded-xl transition-colors ${activeTab === 'torneo' ? 'text-indigo-600' : 'text-slate-400 hover:bg-slate-50'}`}>
                            <Trophy className="w-6 h-6 mb-1" />
                            <span className="text-[10px] font-bold">Torneo</span>
                        </button>
                        <button onClick={() => setActiveTab('ranking')} className={`flex flex-col items-center p-2 min-w-[70px] rounded-xl transition-colors ${activeTab === 'ranking' ? 'text-amber-500' : 'text-slate-400 hover:bg-slate-50'}`}>
                            <BarChart className="w-6 h-6 mb-1" />
                            <span className="text-[10px] font-bold">Ranking</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
